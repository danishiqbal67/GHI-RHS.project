<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup page</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <section>

        <div class="signup-box">
            <form action="">
                <h2>Get Started! Register Yourself</h2>
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="Email" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="Password" required>
                    <label>Create Your Password</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="Password" required>
                    <label>Re-enter Your Password</label>
                </div>
                <div class="your-region">
                    <label for="state">Select Your region</label>
                    <select name="state" id="state">
                        <option value="Bihar">Bihar</option>
                        <option value="West Bengal">West Bengal</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Haryana">Haryana</option>
                        <option value="chhastisgarh">chhastisgarh</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Goa">Goa</option>
                        <option value="Jharkhand">Jharkhand</option>
                        <option value="Maharastra">Maharastra</option>
                        <option value="Punjab">Punjab</option>
                    </select>
                </div>
                <div class="terms-condition">
                    <label> <input type="checkbox" required >I accept the <a href="http://127.0.0.1:3000/terms%20and%20condition/t&c.html">Terms of Service</a> and privacy policy
                    </label>
                </div>
                <button type="submit">Sign Up</button>
                <div class="signin-link">
                    <p>Already registered? <a href="http://127.0.0.1:3000/login%20page/login.html#">Sign in</a></p>
                </div>

            </form>
        </div>


    </section>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>

</html>
